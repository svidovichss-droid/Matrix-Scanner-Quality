name: Build Signed Android Release APK

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7
        cache-read-only: false
        cache-enabled: true

    - name: Grant execute permission for gradlew
      run: |
        cd artifacts/mobile
        chmod +x gradlew

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/keystore.jks

    - name: Update version in build.gradle.kts
      if: github.event_name == 'workflow_dispatch'
      run: |
        cd artifacts/mobile/app
        sed -i "s/versionCode = .*/versionCode = ${{ github.event.inputs.version_code }}/" build.gradle.kts
        sed -i "s/versionName = .*/versionName = \"${{ github.event.inputs.version_name }}\"/" build.gradle.kts

    - name: Build Signed Release APK
      env:
        KEYSTORE_PATH: /tmp/keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd artifacts/mobile
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
          --no-daemon

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed.apk
        path: artifacts/mobile/app/build/outputs/apk/release/*.apk
        if-no-files-found: error

    - name: Upload APK to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/mobile/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
